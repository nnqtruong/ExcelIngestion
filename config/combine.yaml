# How to combine cleaned Parquet files. Output written to analytics/.

# Mode: "union" (concat all) or "join" (merge on key)
mode: union

# Column(s) that must be unique after combination (validated; script fails if duplicates)
primary_key:
  - taskid

# Dedupe strategy when duplicates exist (applied before validation):
#   - "keep_last": Keep the last occurrence of each primary key (sorted by sort_by column)
#   - "keep_first": Keep the first occurrence of each primary key (sorted by sort_by column)
#   - "none" or omit: Fail on duplicates (default)
dedupe_strategy: keep_last
sort_by: dateended  # Column to sort by before deduping (newest last)

# Output filename under analytics/
output: combined.parquet

# Optional: subset and order of files in clean/ (default: all *.parquet, excluding *_errors)
# files:
#   - a.parquet
#   - b.parquet

# For mode: join — column(s) to merge on (same name in both)
# join_on: id
