# Launch tracking data — employee onboarding by track/division/team.

column_aliases:
  "First & Last Name": name
  "Email": email
  "Track": track
  "Division": division
  "Subdivision": subdivision
  "LOB": lob
  "Team Lead": team_lead
  "Team Lead Email": team_lead_email
  "Office Location": office_location

columns:
  name:
    dtype: string
    nullable: false

  email:
    dtype: string
    nullable: false

  track:
    dtype: int64
    nullable: false

  division:
    dtype: string
    nullable: false

  subdivision:
    dtype: string
    nullable: false

  lob:
    dtype: string
    nullable: false

  team_lead:
    dtype: string
    nullable: false

  team_lead_email:
    dtype: string
    nullable: false

  office_location:
    dtype: string
    nullable: false

  _source_file:
    dtype: string
    nullable: true

  _ingested_at:
    dtype: datetime64
    nullable: true

column_order:
  - name
  - email
  - track
  - division
  - subdivision
  - lob
  - team_lead
  - team_lead_email
  - office_location
  - _source_file
  - _ingested_at

validation:
  max_null_rate: 0.05
  max_duplicate_rate: 0.10
  min_row_count: 1
