# Dataset: tasks
# Pipeline root for this dataset. run_pipeline.py reads this file and uses its
# directory as the dataset root. Config and data directories live under here:
#   config/   - schema.yaml, value_maps.yaml, combine.yaml
#   raw/      - input Excel files
#   clean/    - intermediate Parquet
#   errors/   - rows that failed type casting
#   analytics/- combined.parquet; SQLite writes to shared warehouse.db
#   logs/     - pipeline.log, validation_report.json
name: tasks

sqlite:
  database: warehouse.db
  table: tasks
