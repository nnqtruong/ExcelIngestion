version: 2
models:
  - name: mart_tasks_enriched
    description: "Tasks enriched with Workday worker fields, employees_master source_system, and duration/lifecycle metrics (replaces legacy dept_mapping-only joins)."
    columns:
      - name: row_id
        description: "Surrogate key from stg_tasks."
        tests:
          - not_null
          - unique
      - name: duration_hours
        description: "Duration (endtime - starttime) in hours; null when start/end missing."
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
              config:
                where: "duration_hours is not null"
      - name: duration_minutes
        description: "Duration in minutes; null when start/end missing."
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
              config:
                where: "duration_minutes is not null"
      - name: lifecycle_hours
        description: "Hours from dateinitiated to dateended; null when dates missing."
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
              config:
                where: "lifecycle_hours is not null"
      - name: employee_source
        description: "Source system from employees_master (Brokerage/Select/Genpact) when assignee matches employee_id."

  - name: mart_team_capacity
    description: "Active worker headcount and FTE/hours by cost center hierarchy and management level."
    columns:
      - name: department
        description: "Cost center hierarchy (department grouping)."
        tests:
          - not_null
      - name: cost_center
        description: "Cost center."
        tests:
          - not_null
      - name: management_level
        description: "Management level."
        tests:
          - not_null
      - name: headcount
        description: "Count of active workers in the group."
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
      - name: total_fte
        description: "Sum of FTE."
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
              config:
                where: "total_fte is not null"
      - name: total_weekly_hours
        description: "Sum of scheduled weekly hours."
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
              config:
                where: "total_weekly_hours is not null"

  - name: mart_team_demand
    description: "Task volume and handle time by cost center and task initiation date (daily grain; column task_week)."
    columns:
      - name: department
        description: "Cost center hierarchy from assigned worker (null when no worker match on LEFT JOIN)."
      - name: cost_center
        description: "Cost center from assigned worker (null when no worker match on LEFT JOIN)."
      - name: task_week
        description: "Calendar date from dateinitiated (daily grain)."
        tests:
          - not_null
      - name: task_count
        description: "Tasks with start and end times in the bucket."
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
      - name: completed
        description: "Subset with taskstatus Completed."
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
      - name: avg_handle_hours
        description: "Average handle time (start to end) in hours."
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
              config:
                where: "avg_handle_hours is not null"

  - name: mart_onshore_offshore
    description: "Task metrics by employees_master source_system, flow, and step (onshore vs offshore style breakdown)."
    columns:
      - name: source_system
        description: "Brokerage, Select, Genpact, or null if no employee match on LEFT JOIN."
      - name: flowname
        description: "Task flow name."
        tests:
          - not_null
      - name: stepname
        description: "Task step name."
        tests:
          - not_null
      - name: task_count
        description: "Task count with timing data."
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
      - name: avg_handle_hours
        description: "Average handle hours."
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
              config:
                where: "avg_handle_hours is not null"
      - name: completion_rate
        description: "Completed share of tasks (0-100)."
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
          - dbt_utils.expression_is_true:
              arguments:
                expression: "<= 100"

  - name: mart_backlog
    description: "Open / non-completed tasks by drawer, flow, step, and status with average age in days."
    columns:
      - name: drawer
        description: "Office/department code."
        tests:
          - not_null
      - name: flowname
        description: "Flow name."
        tests:
          - not_null
      - name: stepname
        description: "Step name."
        tests:
          - not_null
      - name: taskstatus
        description: "Status (excludes Completed)."
        tests:
          - not_null
      - name: task_count
        description: "Number of tasks in the bucket."
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
      - name: avg_age_days
        description: "Average days from dateinitiated to current_date."
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
              config:
                where: "avg_age_days is not null"

  - name: mart_turnaround
    description: "Completed-task performance: counts and average handle/lifecycle hours by drawer, flow, step."
    columns:
      - name: drawer
        description: "Office/department code."
        tests:
          - not_null
      - name: flowname
        description: "Flow name."
        tests:
          - not_null
      - name: stepname
        description: "Step name."
        tests:
          - not_null
      - name: completed_count
        description: "Completed tasks with timing."
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
      - name: avg_handle_hours
        description: "Average start-to-end hours."
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
              config:
                where: "avg_handle_hours is not null"
      - name: avg_lifecycle_hours
        description: "Average dateinitiated to dateended hours."
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
              config:
                where: "avg_lifecycle_hours is not null"

  - name: mart_daily_trend
    description: "Daily opened vs completed tasks by drawer and net non-completed count for the day."
    columns:
      - name: task_date
        description: "Date from dateinitiated."
        tests:
          - not_null
      - name: drawer
        description: "Office/department code."
        tests:
          - not_null
      - name: tasks_opened
        description: "Tasks initiated on task_date."
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
      - name: tasks_completed
        description: "Subset completed."
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
      - name: net_backlog_change
        description: "Opened minus completed for the day/drawer (can be negative)."

  - name: fact_task_completed
    description: "Certified task-level fact table — one row per completed ImageRight task — used for TAT, SLA, volume reporting, and forecasting."
    columns:
      - name: taskid
        description: "Business key - unique task identifier."
        tests:
          - not_null
          - unique
      - name: completed_date
        description: "Business date of completion."
        tests:
          - not_null
      - name: tat_hours
        description: "End-to-end turnaround time in hours (dateended - dateinitiated)."
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
      - name: flowname
        description: "Workflow name."
      - name: final_stepname
        description: "Last step before completion."

  - name: fact_task_current
    description: "Real-time backlog mart — one row per open ImageRight task — used for aging, bottlenecks, and capacity risk."
    columns:
      - name: taskid
        description: "Business key - unique open task."
        tests:
          - not_null
          - unique
      - name: aging_hours
        description: "Hours since task became available."
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
      - name: as_of_date
        description: "Snapshot date."
        tests:
          - not_null
      - name: flowname
        description: "Current workflow."
      - name: current_stepname
        description: "Current step in workflow."

  - name: fact_task_event
    description: "Step-level process mart — one row per unique task step event — used to identify bottlenecks, queue delays, and workflow inefficiencies."
    columns:
      - name: taskid
        description: "Task identifier (not unique - tasks have multiple events)."
        tests:
          - not_null
      - name: stepname
        description: "Workflow step name."
        tests:
          - not_null
      - name: event_date
        description: "Date the event occurred."
        tests:
          - not_null
      - name: queue_wait_hours
        description: "Hours waiting in queue before work started."
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
              config:
                where: "queue_wait_hours is not null"
      - name: work_duration_hours
        description: "Hours spent working the step."
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
              config:
                where: "work_duration_hours is not null"

  - name: fact_task_rework
    description: "Completed-task rework mart — one row per completed task — measuring loopbacks and repeat step touches to quantify rework and explain TAT/effort impacts."
    columns:
      - name: taskid
        description: "Business key - must exist in fact_task_completed."
        tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('fact_task_completed')
                field: taskid
      - name: total_step_events
        description: "Total deduplicated step events for this task."
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 1"
      - name: rework_step_events
        description: "Count of 2nd+ occurrences of steps."
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
      - name: rework_event_rate
        description: "Ratio of rework events to total events (0-1)."
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
          - dbt_utils.expression_is_true:
              arguments:
                expression: "<= 1"
      - name: is_rework_task
        description: "Flag: 1 if task has any rework, 0 otherwise."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [0, 1]
